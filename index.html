<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's Rock! Paper! Scissors!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="empty-block"></div>
    <h1 id="game-display">Ready?</h1>
    <div id="game-content">
        <button id="play-button">Play</button>
        <div id="options">
            <button id="rock">
                <img id="rock-img" src="assets/rock.png" alt="A stylized hand in a fist representing the rock choice button in the game" width="50" height="50">
                <span id="rock-text">rock</span>
            </button>
            <button id="paper">
                <img id="paper-img" src="assets/paper.png" alt="A stylized open hand palm representing the paper choice button in the game" width="50" height="50">
                <span id="paper-text">paper</span>
            </button>
            <button id="scissors">
                <img id="scissors-img" src="assets/scissors.png" alt="A stylized hand with two fingers extended representing the scissors choice button in the game" width ="50" height ="50">
                <span id="scissors-text">scissors</span>
            </button>
        </div>
        <h2 id="winner-display"></h2>
    </div>
    <script src="script.js"></script>
</body>
</html>
